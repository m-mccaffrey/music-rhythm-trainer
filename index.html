<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Trainer</title>
<script src="https://unpkg.com/vexflow@3.0.9/releases/vexflow-min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent-dim: #4a4180;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --success: #4ade80;
    --warn: #facc15;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    user-select: none;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  .difficulty-row {
    display: flex;
    gap: 8px;
    margin-bottom: 36px;
  }

  .diff-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .diff-btn:hover { border-color: var(--accent); color: var(--text); }
  .diff-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Notation area ───────────────────────────────────────────── */
  .notation-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 8px;
  }

  .row-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .notation-box {
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
    min-height: 90px;
  }

  /* Make VexFlow SVG inherit theme colors */
  .notation-box svg {
    display: block;
    width: 100%;
  }
  .notation-box svg * {
    fill: var(--text);
    stroke: var(--text);
  }
  /* Rests and filled noteheads should be solid fill, not stroked */
  .notation-box svg path { stroke: none; fill: var(--text); }
  .notation-box svg rect { stroke: var(--text); fill: var(--text); }
  /* Stave lines */
  .notation-box svg line { stroke: var(--text); stroke-opacity: 0.35; fill: none; }
  /* Text (time sig, dynamics) */
  .notation-box svg text { fill: var(--text); stroke: none; }
  /* Beams */
  .notation-box svg .vf-beam path { fill: var(--text); stroke: none; }
  /* Barlines */
  .notation-box svg .vf-barline path { fill: var(--text); stroke: none; }

  /* User tap canvas */
  #userCanvas {
    display: block;
    width: 100%;
    height: 70px;
    border-radius: 8px;
    background: var(--surface);
  }

  /* ── Score area ──────────────────────────────────────────────── */
  .score-area {
    width: 100%;
    max-width: 680px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px 0 24px;
  }

  .score-display {
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .score-display.visible { opacity: 1; }

  .score-stars { font-size: 1.4rem; letter-spacing: 4px; margin-bottom: 2px; }
  .score-value { font-size: 2.8rem; font-weight: 700; line-height: 1; margin-bottom: 2px; }
  .score-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }

  /* ── Status pill ─────────────────────────────────────────────── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 24px;
    border: 1px solid transparent;
  }
  .status-pill.waiting  { border-color: var(--border); color: var(--text-dim); }
  .status-pill.recording { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.1); }
  .status-pill.done     { border-color: var(--border); color: var(--text-dim); }

  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 0.8s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

  /* ── Tap button ──────────────────────────────────────────────── */
  .tap-btn {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s, box-shadow 0.08s;
    outline: none;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .tap-btn:hover { background: var(--accent-dim); }
  .tap-btn.pressed {
    background: var(--accent);
    transform: scale(0.92);
    box-shadow: 0 0 28px 6px rgba(124,106,247,0.5);
  }
  .tap-btn-sub {
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: none;
  }
  .tap-btn.pressed .tap-btn-sub { color: rgba(255,255,255,0.7); }

  /* ── Controls ────────────────────────────────────────────────── */
  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }

  .ctrl-btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }
  .ctrl-btn.primary { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.primary:hover { background: var(--accent); color: #fff; }

  .hint { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.05em; }
</style>
</head>
<body>

<h1>Rhythm Trainer</h1>

<div class="difficulty-row">
  <button class="diff-btn active" data-level="easy">Easy</button>
  <button class="diff-btn" data-level="medium">Medium</button>
  <button class="diff-btn" data-level="hard">Hard</button>
  <button class="diff-btn" data-level="pro">Pro</button>
</div>

<div class="notation-wrap">
  <div class="row-label">Target rhythm</div>
  <div class="notation-box" id="notationBox"></div>
  <div class="row-label">Your taps</div>
  <canvas id="userCanvas"></canvas>
</div>

<div class="score-area">
  <div class="score-display" id="scoreDisplay">
    <div class="score-stars" id="scoreStars"></div>
    <div class="score-value" id="scoreValue"></div>
    <div class="score-label" id="scoreLabel"></div>
  </div>
</div>

<div class="status-pill waiting" id="statusPill">
  <span id="statusText">Tap to start</span>
</div>

<button class="tap-btn" id="tapBtn">
  <span>TAP</span>
  <span class="tap-btn-sub" id="btnSub">or press space</span>
</button>

<div class="controls-row">
  <button class="ctrl-btn" id="retryBtn">Retry</button>
  <button class="ctrl-btn primary" id="nextBtn">Next →</button>
</div>

<p class="hint">Match the rhythm above · your tempo doesn't matter, only the proportions do</p>

<script>
const VF = Vex.Flow;

// ─── Pattern definitions ─────────────────────────────────────────────────────
// n(duration, dotted, rest)  — durations follow VexFlow: 'w','h','q','8','16'
// Each pattern MUST sum to exactly 4 beats.
const n = (dur, dot = false, rest = false) => ({ dur, dot, rest });
const r = (dur, dot = false) => n(dur, dot, true);

const DUR_BEATS = { w: 4, h: 2, q: 1, '8': 0.5, '16': 0.25 };
function noteBeats({ dur, dot }) {
  const b = DUR_BEATS[dur] || 1;
  return dot ? b * 1.5 : b;
}

const PATTERNS = {
  easy: [
    [n('q'), n('q'), n('q'), n('q')],
    [n('h'), n('q'), n('q')],
    [n('h'), n('h')],
    [n('h', true), n('q')],            // dotted half + quarter  (3+1=4)
    [r('q'), n('q'), n('q'), n('q')],  // rest + 3 quarters
    [n('w')],
    [n('q'), n('h'), n('q')],
    [n('q'), n('q'), n('h')],
  ],
  medium: [
    [n('8'), n('8'), n('q'), n('q'), n('q')],                             // 4
    [n('q', true), n('8'), n('h')],                                        // 1.5+0.5+2=4
    [n('8'), n('8'), n('8'), n('8'), n('8'), n('8'), n('8'), n('8')],     // all eighths
    [r('8'), n('8'), n('q'), n('q'), n('q')],                              // 4
    [n('8'), n('8'), n('8'), n('8'), n('h')],                              // 4
    [n('q'), n('8'), n('8'), n('8'), n('8'), n('q')],                     // 1+0.5*4+1=4
    [n('h', true), n('8'), n('8')],                                        // 3+0.5+0.5=4
  ],
  hard: [
    [n('16'), n('16'), n('16'), n('16'), n('q'), n('q'), n('q')],          // 1+3=4
    [n('q', true), n('8'), n('q'), n('8'), n('8')],                        // 1.5+0.5+1+0.5+0.5=4
    [n('8'), n('8'), n('q'), n('8'), n('8'), n('8'), n('8')],              // 4
    [n('16'), n('16'), n('8'), n('q'), n('h')],                            // 0.25+0.25+0.5+1+2=4
    [n('8'), r('8'), n('8'), r('8'), n('q'), n('q')],                      // offbeat eighths
    [n('16'),n('16'),n('16'),n('16'),n('8'),n('8'),n('q'),n('q')],        // 4
  ],
  pro: [
    [n('16'),n('16'),n('16'),n('16'),n('16'),n('16'),n('16'),n('16'),n('h')], // 2+2=4
    [n('q', true), n('8'), n('q', true), n('8')],                           // 1.5+0.5+1.5+0.5=4
    [r('8'), n('8'), r('8'), n('8'), r('8'), n('8'), r('8'), n('8')],       // all offbeats
    [n('16'), n('8'), n('16'), n('q'), n('q'), n('q')],                     // 0.25+0.5+0.25+3=4
    [n('8'),n('16'),n('16'),n('8'),n('16'),n('16'),n('q'),n('q')],         // 4
    [n('q',true),n('16'),n('16'),n('8'),n('q'),n('q')],                    // 1.5+0.25+0.25+0.5+1+0.5=4
  ],
};

// Sanity check patterns sum to 4 beats
Object.entries(PATTERNS).forEach(([level, list]) => {
  list.forEach((p, i) => {
    const sum = p.reduce((a, note) => a + noteBeats(note), 0);
    if (Math.abs(sum - 4) > 0.001)
      console.warn(`Pattern ${level}[${i}] sums to ${sum}, expected 4`);
  });
});

// ─── State ───────────────────────────────────────────────────────────────────
let currentLevel = 'easy';
let currentPattern = null;
let state = 'idle';
let tapTimes = [];
let recordingStart = null;
let endTimer = null;

// VexFlow measure layout info (set when rendering, used to align user canvas)
let bar1PixelStart = 0; // x offset (in CSS px) where bar 1 notes start
let bar1PixelWidth = 0; // width (in CSS px) spanning bar 1

// ─── DOM ─────────────────────────────────────────────────────────────────────
const notationBox  = document.getElementById('notationBox');
const userCanvas   = document.getElementById('userCanvas');
const tapBtn       = document.getElementById('tapBtn');
const btnSub       = document.getElementById('btnSub');
const statusPill   = document.getElementById('statusPill');
const scoreDisplay = document.getElementById('scoreDisplay');
const scoreValue   = document.getElementById('scoreValue');
const scoreLabel   = document.getElementById('scoreLabel');
const scoreStars   = document.getElementById('scoreStars');
const retryBtn     = document.getElementById('retryBtn');
const nextBtn      = document.getElementById('nextBtn');

// ─── Notation rendering ───────────────────────────────────────────────────────
function renderNotation(pattern) {
  notationBox.innerHTML = '';

  const containerW = notationBox.offsetWidth || 640;
  const H = 90;
  const dpr = window.devicePixelRatio || 1;

  const renderer = new VF.Renderer(notationBox, VF.Renderer.Backends.SVG);
  renderer.resize(containerW, H);
  const ctx = renderer.getContext();
  ctx.setFont('Arial', 10, '');
  ctx.setFillStyle('#e8e8f0');
  ctx.setStrokeStyle('#e8e8f0');
  ctx.setLineWidth(1.2);

  const margin = 10;
  const totalW = containerW - margin * 2;
  // Give bar 1 ~70% of space, bar 2 (whole note) ~30%
  const b1W = Math.round(totalW * 0.70);
  const b2W = totalW - b1W;
  const staveY = 14;

  // Bar 1
  const stave1 = new VF.Stave(margin, staveY, b1W);
  stave1.addClef('percussion');
  stave1.addTimeSignature('4/4');
  stave1.setContext(ctx).draw();

  // Bar 2 (whole note reference)
  const stave2 = new VF.Stave(margin + b1W, staveY, b2W);
  stave2.setEndBarType(VF.Barline.type.END);
  stave2.setContext(ctx).draw();

  // Build VexFlow notes for bar 1
  const vfNotes1 = pattern.map(spec => {
    const durStr = spec.rest ? spec.dur + 'r' : spec.dur;
    const note = new VF.StaveNote({ clef: 'percussion', keys: ['b/4'], duration: durStr });
    if (spec.dot) note.addDotToAll();
    return note;
  });

  // Whole note for bar 2
  const vfNotes2 = [new VF.StaveNote({ clef: 'percussion', keys: ['b/4'], duration: 'w' })];

  const voice1 = new VF.Voice({ num_beats: 4, beat_value: 4 }).setMode(VF.Voice.Mode.SOFT);
  voice1.addTickables(vfNotes1);

  const voice2 = new VF.Voice({ num_beats: 4, beat_value: 4 }).setMode(VF.Voice.Mode.SOFT);
  voice2.addTickables(vfNotes2);

  // Stave intrinsics (clef + time sig) take up some space; estimate padding
  const b1NoteArea = b1W - 52; // rough space consumed by clef+timesig
  const b2NoteArea = b2W - 16;

  new VF.Formatter().joinVoices([voice1]).format([voice1], b1NoteArea);
  new VF.Formatter().joinVoices([voice2]).format([voice2], b2NoteArea);

  voice1.draw(ctx, stave1);
  voice2.draw(ctx, stave2);

  // Auto-beam eighth/sixteenth notes in bar 1
  const beamable = vfNotes1.filter(n => !n.isRest());
  const beams = VF.Beam.generateBeams(beamable);
  beams.forEach(b => b.setContext(ctx).draw());

  // Record bar 1 layout for user-canvas alignment
  // The note area starts after clef+timesig padding (≈52px from left edge of stave)
  bar1PixelStart = margin + 52;
  bar1PixelWidth = b1NoteArea;
}

// ─── User tap canvas ──────────────────────────────────────────────────────────
function resizeUserCanvas() {
  const rect = userCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  userCanvas.width  = rect.width * dpr;
  userCanvas.height = userCanvas.offsetHeight * dpr;
  userCanvas.style.width  = rect.width + 'px';
  userCanvas.style.height = userCanvas.offsetHeight + 'px';
}

function drawUserTaps(relPositions, scoreColors) {
  resizeUserCanvas();
  const ctx = userCanvas.getContext('2d');
  const W = userCanvas.width, H = userCanvas.height;
  const dpr = window.devicePixelRatio || 1;

  ctx.clearRect(0, 0, W, H);

  const notationContainerW = notationBox.offsetWidth;
  const canvasW = userCanvas.offsetWidth;

  // Map bar1 pixel layout to canvas coordinate space
  // bar1PixelStart and bar1PixelWidth are in CSS px of the notation box
  const scaleX = canvasW / notationContainerW;
  const tapAreaStart = bar1PixelStart * scaleX * dpr;
  const tapAreaWidth = bar1PixelWidth * scaleX * dpr;

  const midY = H / 2;
  const tickH = H * 0.55;

  // Draw baseline
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = dpr;
  ctx.beginPath();
  ctx.moveTo(tapAreaStart, midY);
  ctx.lineTo(tapAreaStart + tapAreaWidth, midY);
  ctx.stroke();

  // Endpoint marks
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.5 * dpr;
  [tapAreaStart, tapAreaStart + tapAreaWidth].forEach(x => {
    ctx.beginPath();
    ctx.moveTo(x, midY - H * 0.32);
    ctx.lineTo(x, midY + H * 0.32);
    ctx.stroke();
  });

  if (!relPositions || relPositions.length === 0) return;

  relPositions.forEach((rel, i) => {
    const x = tapAreaStart + rel * tapAreaWidth;
    const color = scoreColors ? scoreColors[i] : 'rgba(168,154,249,0.9)';

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 6 * dpr;

    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5 * dpr;
    ctx.beginPath();
    ctx.moveTo(x, midY - tickH / 2);
    ctx.lineTo(x, midY + tickH / 2);
    ctx.stroke();

    ctx.shadowBlur = 0;
  });
}

// ─── Scoring ──────────────────────────────────────────────────────────────────
function patternToRelative(pattern) {
  const positions = [];
  let pos = 0;
  pattern.forEach(note => {
    if (!note.rest) positions.push(pos / 4);
    pos += noteBeats(note);
  });
  return positions;
}

function inferRelative(times) {
  if (times.length < 2) return [0];
  const span = times[times.length - 1] - times[0];
  const lastGap = times[times.length - 1] - times[times.length - 2];
  const estimated = span + lastGap * 0.5;
  return times.map(t => (t - times[0]) / estimated);
}

function scoreAttempt(targetRel, userRel) {
  if (!userRel.length) return 0;
  const used = new Set();
  let totalErr = 0;
  let matched = 0;

  targetRel.forEach(t => {
    let best = Infinity, bestIdx = -1;
    userRel.forEach((u, i) => {
      if (used.has(i)) return;
      const d = Math.abs(t - u);
      if (d < best) { best = d; bestIdx = i; }
    });
    if (bestIdx >= 0) { used.add(bestIdx); totalErr += best; matched++; }
  });

  const extra   = userRel.length - matched;
  const missing = targetRel.length - matched;
  const avgErr  = matched > 0 ? totalErr / matched : 1;

  return Math.round(Math.max(0, 1 - avgErr * 6 - extra * 0.04 - missing * 0.08) * 100);
}

// Map each user tap to a color based on distance to nearest target
function tapColors(targetRel, userRel) {
  return userRel.map(u => {
    const nearest = Math.min(...targetRel.map(t => Math.abs(t - u)));
    if (nearest < 0.04)  return '#4ade80';
    if (nearest < 0.09)  return '#facc15';
    return '#f87171';
  });
}

function scoreToLabel(s) {
  if (s >= 95) return 'Perfect!';
  if (s >= 80) return 'Great!';
  if (s >= 65) return 'Good';
  if (s >= 45) return 'Close';
  if (s >= 25) return 'Keep going';
  return 'Try again';
}
function scoreToStars(s) {
  if (s >= 90) return '★★★';
  if (s >= 65) return '★★☆';
  if (s >= 40) return '★☆☆';
  return '☆☆☆';
}
function scoreToColor(s) {
  if (s >= 80) return '#4ade80';
  if (s >= 55) return '#facc15';
  return '#f87171';
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function setStatus(mode, text) {
  statusPill.className = 'status-pill ' + mode;
  statusPill.innerHTML = mode === 'recording'
    ? `<div class="pulse-dot"></div><span>${text}</span>`
    : `<span>${text}</span>`;
}

function showScore(score) {
  const c = scoreToColor(score);
  scoreStars.textContent = scoreToStars(score);
  scoreStars.style.color = c;
  scoreValue.textContent = score;
  scoreValue.style.color = c;
  scoreLabel.textContent = scoreToLabel(score);
  scoreDisplay.classList.add('visible');
}

function hideScore() {
  scoreDisplay.classList.remove('visible');
}

// ─── App lifecycle ────────────────────────────────────────────────────────────
function pickPattern() {
  const pool = PATTERNS[currentLevel];
  return pool[Math.floor(Math.random() * pool.length)];
}

function loadPattern(pattern) {
  currentPattern = pattern;
  state = 'idle';
  tapTimes = [];
  recordingStart = null;
  clearTimeout(endTimer);
  hideScore();
  setStatus('waiting', 'Tap to start');
  btnSub.textContent = 'or press space';

  renderNotation(pattern);
  drawUserTaps(null);
}

function startRecording() {
  state = 'recording';
  tapTimes = [];
  recordingStart = performance.now();
  setStatus('recording', 'Recording…');
  btnSub.textContent = 'keep tapping!';
  hideScore();
  drawUserTaps([]);
}

function registerTap() {
  if (state === 'idle' || state === 'done') {
    startRecording();
    tapTimes.push(0);
    drawUserTaps([0]);
    armEndTimer();
    return;
  }
  if (state === 'recording') {
    const t = performance.now() - recordingStart;
    tapTimes.push(t);
    clearTimeout(endTimer);
    armEndTimer();
    drawUserTaps(inferRelative(tapTimes));
  }
}

function armEndTimer() {
  const ms = { easy: 1800, medium: 1600, hard: 1400, pro: 1200 }[currentLevel];
  endTimer = setTimeout(finishRecording, ms);
}

function finishRecording() {
  if (state !== 'recording') return;
  state = 'done';

  if (!tapTimes.length) {
    setStatus('done', 'No taps detected');
    return;
  }

  const userRel   = inferRelative(tapTimes);
  const targetRel = patternToRelative(currentPattern);
  const score     = scoreAttempt(targetRel, userRel);
  const colors    = tapColors(targetRel, userRel);

  drawUserTaps(userRel, colors);
  showScore(score);
  setStatus('done', 'Tap to retry · Next for a new pattern');
  btnSub.textContent = 'retry or press space';
}

// ─── Events ───────────────────────────────────────────────────────────────────
function handleTap(e) {
  e.preventDefault();
  tapBtn.classList.add('pressed');
  registerTap();
}

tapBtn.addEventListener('mousedown',  handleTap);
tapBtn.addEventListener('touchstart', handleTap, { passive: false });
tapBtn.addEventListener('mouseup',    () => tapBtn.classList.remove('pressed'));
tapBtn.addEventListener('mouseleave', () => tapBtn.classList.remove('pressed'));
tapBtn.addEventListener('touchend',   () => tapBtn.classList.remove('pressed'));

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    tapBtn.classList.add('pressed');
    registerTap();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') tapBtn.classList.remove('pressed');
});

retryBtn.addEventListener('click', () => { loadPattern(currentPattern); });
nextBtn.addEventListener('click',  () => { loadPattern(pickPattern()); });

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
    loadPattern(pickPattern());
  });
});

window.addEventListener('resize', () => {
  renderNotation(currentPattern);
  if (tapTimes.length > 1) {
    const rel    = inferRelative(tapTimes);
    const target = patternToRelative(currentPattern);
    const cols   = state === 'done' ? tapColors(target, rel) : null;
    drawUserTaps(rel, cols);
  } else {
    drawUserTaps(null);
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadPattern(pickPattern());
</script>
</body>
</html>
